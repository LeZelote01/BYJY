# ============================================================================
# 🛡️ CyberSec Assistant - Configuration des Proxies Externes
# ============================================================================
# Ce fichier permet de configurer facilement les proxies externes et Tor
# pour améliorer l'anonymat et la furtivité de vos opérations
# ============================================================================

[GENERAL]
# Activer/Désactiver l'utilisation des proxies externes
# Valeurs possibles: true, false
use_external_proxies = false

# Niveau de furtivité général (1-10)
# 1 = Basique, 5 = Modéré, 10 = Maximum
stealth_level = 5

# Rotation automatique des proxies
# Valeurs possibles: true, false
auto_rotate_proxies = false

# Intervalle de rotation (nombre de requêtes avant changement)
rotation_interval = 50

[TOR]
# Activer/Désactiver Tor
# Valeurs possibles: true, false
enabled = false

# Démarrage automatique de Tor
# Valeurs possibles: true, false  
auto_start = true

# Utiliser Tor comme proxy principal
# Valeurs possibles: true, false
use_as_primary = false

# Port du proxy SOCKS5 de Tor (généralement 9050)
socks_port = 9050

# Port de contrôle de Tor (généralement 9051)
control_port = 9051

# Délai minimum entre les requêtes via Tor (en secondes)
request_delay_min = 3.0

# Délai maximum entre les requêtes via Tor (en secondes)
request_delay_max = 8.0

[EXTERNAL_PROXIES]
# Activer l'utilisation de proxies externes
# Valeurs possibles: true, false
enabled = false

# Liste des proxies externes (format: type://host:port)
# Types supportés: http, https, socks4, socks5
# Un proxy par ligne, utilisez # pour commenter
#
# Exemples:
# http://proxy1.example.com:8080
# socks5://proxy2.example.com:1080
# https://user:pass@proxy3.example.com:3128
#
# Proxies publics (décommentez pour utiliser):
# http://20.203.61.207:80
# http://51.75.126.150:3128
# http://103.148.72.126:80

proxy_list = 

# Test automatique de la qualité des proxies
# Valeurs possibles: true, false
auto_test_proxies = true

# Score minimum requis pour utiliser un proxy (0.0 - 1.0)
minimum_quality_score = 0.7

# Timeout pour tester un proxy (en secondes)
test_timeout = 10

[SAFETY]
# Vérifications de sécurité supplémentaires
# Valeurs possibles: true, false
enable_safety_checks = true

# Bloquer les requêtes si aucun proxy n'est disponible
# Valeurs possibles: true, false
block_if_no_proxy = false

# Avertir si l'IP réelle est détectée
# Valeurs possibles: true, false
warn_ip_leak = true

# Maximum de tentatives échouées avant désactivation
max_failed_attempts = 3

# Désactiver automatiquement en cas de détection
auto_disable_on_detection = true

[ADVANCED]
# Options avancées pour utilisateurs expérimentés

# User-Agent rotation
# Valeurs possibles: true, false
rotate_user_agents = true

# Headers HTTP personnalisés (format JSON)
# Exemple: {"X-Forwarded-For": "192.168.1.1"}
custom_headers = {}

# Utiliser des chaînes de proxies (proxy chaining)
# Valeurs possibles: true, false
enable_proxy_chaining = false

# Longueur des chaînes de proxies (2-5)
chain_length = 2

# Délai aléatoire supplémentaire entre requêtes (en secondes)
random_delay_max = 2.0

# Utiliser des sessions persistantes
# Valeurs possibles: true, false
use_persistent_sessions = true

# ============================================================================
# 📝 NOTES D'UTILISATION:
# ============================================================================
# 
# 1. PREMIER USAGE:
#    - Mettez 'enabled = true' dans [TOR] pour activer Tor
#    - L'application installera Tor automatiquement si nécessaire
#
# 2. PROXIES EXTERNES:
#    - Ajoutez vos proxies dans la section [EXTERNAL_PROXIES]
#    - Format: type://host:port ou type://user:pass@host:port
#    - Un proxy par ligne
#
# 3. NIVEAUX DE FURTIVITÉ:
#    - 1-3: Furtivité basique, vitesse élevée
#    - 4-6: Furtivité modérée, équilibre vitesse/anonymat
#    - 7-10: Furtivité maximale, vitesse réduite
#
# 4. SÉCURITÉ:
#    - Ne jamais utiliser sur des systèmes non autorisés
#    - Respectez les lois locales sur l'utilisation de proxies/Tor
#    - Cette configuration est pour des tests légaux uniquement
#
# ============================================================================